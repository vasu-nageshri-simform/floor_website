<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Floor Planner</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <div id="toolbar">
    <div class="tb-group" id="tools-group">
      <button class="tool-btn" data-tool="select" title="Select (V)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 3 L4 20 L9 16 L12 21 L15 19.5 L12 14.5 L18 14 Z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="wall" title="Wall (W)">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="2" y="10" width="20" height="4" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="room" title="Room (R)">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="door" title="Door (D)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 21 L4 3 L14 3 L14 21" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 21 A10 10 0 0 0 14 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/></svg>
      </button>
      <button class="tool-btn" data-tool="window" title="Window (N)">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="9" width="18" height="6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="tool-btn" data-tool="pan" title="Pan (Space/H)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2 L12 14 M8 6 L8 14 M16 6 L16 14 M5 12 C5 12 5 18 8 20 C10 21.5 14 21.5 16 20 C19 18 19 14 19 12 L19 9 C19 7.5 17 7.5 17 9 M8 14 C8 12.5 6 12.5 6 14 L6 15 M16 14 C16 12.5 18 12.5 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="tb-group">
      <button id="zoom-in-btn" title="Zoom in">+</button>
      <button id="zoom-out-btn" title="Zoom out">&minus;</button>
      <button id="zoom-reset-btn" title="Reset view">Fit</button>
    </div>

    <div class="tb-group">
      <button id="undo-btn" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M8 7 L3 12 L8 17 M3 12 L14 12 C18 12 21 15 21 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="redo-btn" title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16 7 L21 12 L16 17 M21 12 L10 12 C6 12 3 15 3 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="tb-group">
      <button id="export-btn" title="Export plan.json">Export</button>
      <button id="import-btn" title="Import JSON">Import</button>
      <input type="file" id="import-file-input" accept=".json,application/json" style="display:none">
      <button id="clear-btn" title="Clear plan">Clear</button>
    </div>

    <div class="tb-group tb-grow">
      <input type="text" id="plan-name-input" placeholder="Untitled Plan">
    </div>
  </div>

  <div id="main-area">

    <div id="furniture-palette">
      <h3>Furniture</h3>
      <div id="palette-list"></div>
    </div>

    <div id="canvas-wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid-minor" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e3e8ee" stroke-width="1"/>
          </pattern>
          <pattern id="grid-major" width="60" height="60" patternUnits="userSpaceOnUse">
            <rect width="60" height="60" fill="url(#grid-minor)"/>
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c7ced8" stroke-width="1"/>
          </pattern>
        </defs>
        <g id="viewport">
          <rect id="grid-bg" x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid-major)"></rect>
          <g id="layer-rooms"></g>
          <g id="layer-walls"></g>
          <g id="layer-openings"></g>
          <g id="layer-furniture"></g>
          <g id="layer-draw-preview"></g>
          <g id="layer-selection"></g>
        </g>
      </svg>
      <div id="hint-bar"></div>
    </div>

    <div id="properties-panel">
      <h3>Properties</h3>
      <div id="properties-content">
        <p class="empty-msg">Nothing selected.</p>
      </div>
    </div>

  </div>
</div>

<script src="js/state.js"></script>
<script src="js/geometry.js"></script>
<script src="js/render.js"></script>
<script src="js/furniture.js"></script>
<script src="js/properties.js"></script>
<script src="js/tools.js"></script>
<script src="js/viewport.js"></script>
<script src="js/bridge.js"></script>
<script src="js/main.js"></script>
</body>
</html>
